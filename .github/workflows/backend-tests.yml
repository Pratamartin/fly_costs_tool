name: Backend Unit Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'testes/backend/**'
      - '.github/workflows/backend-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'testes/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: testes/backend/package-lock.json

      - name: Install dependencies
        working-directory: testes/backend
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        working-directory: testes/backend
        run: npm test

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == 'success' ]; then
            echo "OK - All tests passed!" >> $GITHUB_STEP_SUMMARY
          else
            echo "ERROR - Tests failed. Please check the logs above." >> $GITHUB_STEP_SUMMARY
          fi
