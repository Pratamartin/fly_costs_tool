name: Backend Unit Tests

on:
  pull_request:
    paths:
      - 'backend/**'
      - 'testes/backend/**'
      - '.github/workflows/backend-tests.yml'
  push:
    branches:
      - main
    paths:
      - 'backend/**'
      - 'testes/backend/**'

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: testes/backend/package-lock.json

      - name: Setup Prisma mocks
        run: |
          mkdir -p backend/src/generated/prisma
          cp testes/backend/mocks/prisma-client.ts backend/src/generated/prisma/client.ts
          cp testes/backend/mocks/prisma-enums.ts backend/src/generated/prisma/enums.ts

      - name: Install dependencies
        working-directory: testes/backend
        run: npm install --legacy-peer-deps

      - name: Run unit tests
        working-directory: testes/backend
        run: npm test

      - name: Test Summary
        if: always()
        run: |
          echo "### Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ ${{ job.status }} == 'success' ]; then
            echo "All tests passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "Tests failed - check logs above" >> $GITHUB_STEP_SUMMARY
          fi

  integration-test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: "dummy-url-just-to-generate-prisma-client"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: backend
        run: npm ci --no-audit --no-fund --prefer-offline

      - name: Run integration tests
        working-directory: backend
        run: npm test
  